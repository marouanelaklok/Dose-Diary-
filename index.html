function getInteractionKey(a, b) {
  const sorted = [a, b].sort();
  return `${sorted[0]}+${sorted[1]}`;
}

function findMixWarnings(currentSub, recentSubs) {
  const warnings = [];
  for (const recent of recentSubs) {
    if (recent === currentSub) continue;
    const key = getInteractionKey(currentSub, recent);
    if (INTERACTION_MATRIX[key]) {
      warnings.push({ sub: recent, ...INTERACTION_MATRIX[key] });
    }
  }
  // Sort by severity
  const order = { critical: 0, high: 1, medium: 2 };
  warnings.sort((a, b) => (order[a.level] ?? 3) - (order[b.level] ?? 3));
  return warnings;
}

// Deuteranopie/Protanopie-sichere Risikoindikation:
// Unterscheidung durch FORM (▲ △ ◇ ○) + HELLIGKEIT + Farbe — nie nur Farbe allein
const RISK_META = {
  critical : { icon:"⛔", shape:"▲", label:"Sehr hohes Risiko",  color:"var(--risk-critical)" },
  high     : { icon:"🔶", shape:"▲", label:"Hohes Risiko",        color:"var(--risk-high)"     },
  medium   : { icon:"🔸", shape:"◆", label:"Mittleres Risiko",    color:"var(--risk-medium)"   },
  low      : { icon:"🔷", shape:"●", label:"Niedriges Risiko",    color:"var(--risk-low)"      },
  unknown  : { icon:"❓", shape:"?", label:"Unbekanntes Risiko",  color:"#8899AA"              },
};
const riskMeta = (riskStr) => {
  if (!riskStr) return RISK_META.unknown;
  const r = riskStr.toLowerCase();
  if (r.includes("sehr hoch") || r.includes("kritisch")) return RISK_META.critical;
  if (r.includes("hoch"))    return RISK_META.high;
  if (r.includes("mittel"))  return RISK_META.medium;
  if (r.includes("niedrig")) return RISK_META.low;
  return RISK_META.unknown;
};
const ago = d => { const m=Math.floor((Date.now()-new Date(d).getTime())/60000); if(m<60)return`vor ${m}m`; const h=Math.floor(m/60); if(h<24)return`vor ${h}h`; return`vor ${Math.floor(h/24)}d`; };
const weekLogs = logs => { const s=new Date(); s.setDate(s.getDate()-s.getDay()+1); s.setHours(0,0,0,0); return logs.filter(l=>new Date(l.date)>=s).length; };
const avgMood = ms => ms.length ? (ms.reduce((s,m)=>s+m.value,0)/ms.length).toFixed(1) : "–";
const byDay = logs => { const d={Mo:0,Di:0,Mi:0,Do:0,Fr:0,Sa:0,So:0}, m=["So","Mo","Di","Mi","Do","Fr","Sa"]; logs.forEach(l=>{d[m[new Date(l.date).getDay()]]++}); return d; };
const byTime = logs => { const t={"Morgen":0,"Nachmittag":0,"Abend":0,"Nacht":0}; logs.forEach(l=>{const h=new Date(l.date).getHours(); if(h>=6&&h<12)t.Morgen++;else if(h>=12&&h<18)t.Nachmittag++;else if(h>=18)t.Abend++;else t.Nacht++;}); return t; };
const bySub = logs => logs.reduce((a,l)=>{a[l.substance]=(a[l.substance]||0)+1;return a},{});
const mostCommon = arr => { const c=arr.reduce((a,v)=>{a[v]=(a[v]||0)+1;return a},{}); return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||"–"; };


// ─── Mood Trend (14 days) ───
const moodTrend = (moods, days=14) => {
  const result = [];
  for (let i = days-1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const ds = d.toISOString().split("T")[0];
    const label = d.toLocaleDateString("de-DE",{weekday:"short"}).slice(0,2);
    const found = moods.find(m => m.date?.split("T")[0] === ds || new Date(m.date).toISOString().split("T")[0] === ds);
    result.push({ ds, label, value: found?.value||null, emoji: found?.emoji||null, isToday: i===0 });
  }
  return result;
};

// ─── Weekly Summary ───
const calcWeekSummary = (logs, moods, cleanDays) => {
  const ws = new Date(); ws.setDate(ws.getDate()-ws.getDay()+1); ws.setHours(0,0,0,0);
  const wLogs = logs.filter(l => new Date(l.date)>=ws);
  const wMoods = moods.filter(m => new Date(m.date)>=ws);
  const wClean = (cleanDays||[]).filter(d => new Date(d)>=ws).length;
  const avgC = wLogs.length ? +(wLogs.reduce((s,l)=>s+(l.craving||0),0)/wLogs.length).toFixed(1) : null;
  const avgM = wMoods.length ? +(wMoods.reduce((s,m)=>s+m.value,0)/wMoods.length).toFixed(1) : null;
  const topSub = wLogs.length ? mostCommon(wLogs.map(l=>l.substance)) : null;
  return { logCount:wLogs.length, cleanCount:wClean, avgCraving:avgC, avgMood:avgM, topSub };
};


// ─── Clean Day & Streak Helpers ───
const dateStr = d => new Date(d).toISOString().split("T")[0];
const todayStr = () => dateStr(new Date());
const calcStreak = (cleanDays, logs) => {
  if (!cleanDays?.length) return 0;
  const logDates = new Set(logs.map(l => dateStr(l.date)));
  const cleanSet = new Set(cleanDays);
  let streak = 0;
  const d = new Date(); d.setHours(0,0,0,0);
  // Check today: either marked clean or simply no log today
  const tStr = dateStr(d);
  if (!cleanSet.has(tStr) && logDates.has(tStr)) return 0; // consumed today
  if (cleanSet.has(tStr)) streak = 1;
  else if (!logDates.has(tStr)) { /* today ambiguous, don't count but don't break */ }
  // Walk backwards
  for (let i = 1; i < 1000; i++) {
    const prev = new Date(d); prev.setDate(prev.getDate() - i);
    const pStr = dateStr(prev);
    if (cleanSet.has(pStr)) { streak++; }
    else if (logDates.has(pStr)) { break; }
    else { break; } // no data = streak ends
  }
  return streak;
};
const calcLongestStreak = (cleanDays) => {
  if (!cleanDays?.length) return 0;
  const sorted = [...cleanDays].sort();
  let max = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i-1]); prev.setDate(prev.getDate() + 1);
    if (dateStr(prev) === sorted[i]) { cur++; max = Math.max(max, cur); }
    else { cur = 1; }
  }
  return max;
};
const calcGoalProgress = (goals, logs) => {
  if (!goals.target || !goals.startDate) return null;
  const start = new Date(goals.startDate); start.setHours(0,0,0,0);
  const now = new Date(); now.setHours(0,0,0,0);
  const totalDays = Math.floor((now - start) / 864e5) + 1;
  const cleanInRange = (goals.cleanDays || []).filter(d => d >= dateStr(start) && d <= dateStr(now)).length;
  return { totalDays, cleanInRange, target: goals.target, pct: Math.min(100, Math.round(cleanInRange / goals.target * 100)) };
};

function DoseDiary() {

  const [retroCleanOpen, setRetroCleanOpen] = useState(false);
  const [milestonePopup, setMilestonePopup] = useState(null); // {id, title, icon, color, popup}
  const [seenMilestones, setSeenMilestones] = useState(new Set());
  const [retroCleanDate, setRetroCleanDate] = useState(() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
  });
  const [goalTab, setGoalTab] = useState("track"); // track | goal | history

  // Check onboarding status on mount
  useEffect(() => {
    (async () => {
      const ob = await S.get("dd_onboarded");
      if (ob === true) {
        setOnboarded(true);
        const [m, l, g, p] = await Promise.all([S.get("dd_moods"), S.get("dd_logs"), S.get("dd_goals"), S.get("dd_prefs")]);
        if (m) { setMoods(m); const t = m.find(x => new Date(x.date).toDateString() === new Date().toDateString()); if (t) setTodayMood(t.value); }
        if (l) setLogs(l);
        if (g) setGoals(g);
        if (p) {
          setPrefs(p);
          // Sperre beim Start aktivieren wenn PIN gesetzt
          if (p.pin) setLocked(true);
        }
        const kb = await S.get("dd_kb");
        if (kb) setKbProgress(kb);
        const sb = await S.get("dd_skillbox");
        if (sb) setSkillbox(sb);
        const pl = await S.get("dd_planers");
        if (Array.isArray(pl) && pl.length) { setPlaners(pl); }
        else if (pl && !Array.isArray(pl) && pl.active) {
          // Migriere altes Single-Planer-Format
          const migrated = [{ ...pl, id: String(Date.now()) }];
          setPlaners(migrated); await S.set("dd_planers", migrated);
        }
        const gcc = await S.get("dd_challenge_count");
        if (typeof gcc === "number") setGlobalChallengeCount(gcc);
      } else {
        setOnboarded(false);
      }
    })();
  }, []);

  const save = useCallback(async (key, setter, data) => { setter(data); await S.set(key, data); }, []);
  // Sperre bei App-Hintergrund (visibilitychange)
  useEffect(() => {
    const handler = () => {
      if (document.visibilityState === "visible" && prefs?.pin) {
        setLocked(true);
      }
    };
    document.addEventListener("visibilitychange", handler);
    return () => document.removeEventListener("visibilitychange", handler);
  }, [prefs?.pin]);

  // Milestone-Check: bei jeder Änderung von logs/moods/goals/kbProgress/skillbox
  useEffect(() => {
    const newlyEarned = MILESTONES.filter(ms =>
      !seenMilestones.has(ms.id) && ms.check(logs, moods, goals, kbProgress, skillbox)
    );
    if (newlyEarned.length > 0) {
      setSeenMilestones(prev => {
        const next = new Set(prev);
        newlyEarned.forEach(ms => next.add(ms.id));
        return next;
      });
      // Zeige das erste neue Popup (Queue: weitere erscheinen beim nächsten Render)

  const Dashboard = () => {
    const todayClean = goals.cleanDays?.includes(todayStr());
    const streak = calcStreak(goals.cleanDays || [], logs);

    // Mood Check-in
    const moodDone = !!todayMood;

    // Statuszeile
    const todayLogs = logs.filter(l => l.date?.split("T")[0] === todayStr()).length;
    const avg7 = (() => {
      const d7 = new Date(); d7.setDate(d7.getDate() - 7);
      const recent = moods.filter(m => new Date(m.date) >= d7);
      return recent.length ? (recent.reduce((s,m) => s + m.value, 0) / recent.length).toFixed(1) : null;
    })();

    // 24h Misch-Check (kritische Warnung beibehalten)
    const recent24h = logs
      .filter(l => Date.now() - new Date(l.date).getTime() < 24 * 60 * 60 * 1000)
      .map(l => l.substance).filter((v,i,a) => a.indexOf(v) === i);
    let mixWarn = null;
    if (recent24h.length >= 2) {
      const warns = [];
      for (let a = 0; a < recent24h.length; a++)
        for (let b = a+1; b < recent24h.length; b++) {
          const k = getInteractionKey(recent24h[a], recent24h[b]);
          if (INTERACTION_MATRIX[k]) warns.push({ subA:recent24h[a], subB:recent24h[b], ...INTERACTION_MATRIX[k] });
        }
      warns.sort((a,b) => ({critical:0,high:1,medium:2}[a.level]??3)-({critical:0,high:1,medium:2}[b.level]??3));
      if (warns.length) mixWarn = warns[0];

      { icon:"🎯", label:"Ziel",      id:"goals"  },

        {!moodDone ? (
          <>
            <p className="text-sm font-bold text-center mb-3" style={{color:"var(--tx)"}}>Wie geht es dir gerade?</p>
            <div className="flex justify-between gap-1" role="group" aria-label="Stimmung auswählen">
              {MOODS.map(m => (
                <button key={m.value} onClick={() => handleMood(m)}
                  aria-label={`Stimmung: ${m.label}`}
                  className="flex flex-col items-center gap-1 flex-1 py-2 rounded-xl transition-all active:scale-90"
                  style={{background:"var(--card2)"}}>
                  <span style={{fontSize:24}}>{m.emoji}</span>

          </>

            <div className="flex items-center gap-3">
              <span style={{fontSize:28}}>{MOODS.find(m=>m.value===todayMood)?.emoji}</span>
              <div>
                <p className="text-sm font-semibold" style={{color:"var(--tx)"}}>
                  {MOODS.find(m=>m.value===todayMood)?.label}

                <p className="text-xs" style={{color:"var(--tx2)"}}>Heutige Stimmung</p>
              </div>
            </div>
            <button onClick={() => handleMood(null)} className="text-xs px-2.5 py-1 rounded-lg"
              style={{background:"var(--card2)",color:"var(--tx2)",border:"1px solid var(--bdr)"}}>
              Ändern
            </button>
          </div>

      </div>

      {/* ── Misch-Warnung (nur wenn aktiv) ── */}
      {mixWarn && (() => {
        const isCrit = mixWarn.level==="critical", isHigh = mixWarn.level==="high";
        const col = isCrit?"#FF3B3B":isHigh?"#FF8C00":"#FFD700";
        const lbl = isCrit?"⛔ LEBENSGEFAHR":isHigh?"🔶 HOHES RISIKO":"🟡 VORSICHT";
        return (
          <button onClick={() => nav("log")} role="alert"
            className={`w-full rounded-2xl px-4 py-3 text-left ${isCrit?"warn-critical":isHigh?"warn-high":""}`}
            style={{background:`${col}12`,border:`2px solid ${col}55`}}>
            <p className="text-xs font-black mb-1" style={{color:col}}>{lbl} · MISCH-CHECK</p>
            <p className="text-xs" style={{color:"var(--tx)"}}>
              {subEmoji(mixWarn.subA)} {mixWarn.subA} + {subEmoji(mixWarn.subB)} {mixWarn.subB}

            {isCrit && <p className="text-xs mt-1.5 font-bold" style={{color:col}}>📞 Notfall → 112</p>}
          </button>

      {/* ── Was möchtest du tun? ── */}
      <div>
        <p className="text-xs font-bold mb-3 px-1" style={{color:"var(--tx2)"}}>WAS MÖCHTEST DU TUN?</p>

          {ACTIONS.map(a => (
            <button key={a.label} onClick={() => nav(a.id)}

              <span style={{fontSize:26}}>{a.icon}</span>
              <span className="text-xs font-semibold" style={{color:"var(--tx)"}}>{a.label}</span>
            </button>
          ))}

      </div>

      {/* ── Kontextsensitive Fortschritts-Card ── */}
      {(() => {
        // Priorität: 1) aktives Ziel, 2) Streak, 3) KB-Fortschritt
        const hasGoal = goals.target || goals.maxPerWeek;
        const kbRead  = Object.keys(kbProgress.read || {}).length;
        const longest = calcLongestStreak(goals.cleanDays || []);

        // Nächster Streak-Meilenstein
        const streakMilestones = [3, 7, 14, 30, 60, 90];
        const nextStreakMs = streakMilestones.find(m => m > streak) || null;

        // 1) Aktives Abstinenz-Ziel
        if (hasGoal && goals.goalType === "clean" && goals.target) {
          const progress = calcGoalProgress(goals, logs);
          if (!progress) return null;
          const pct = Math.min(100, progress.pct);
          const done = pct >= 100;
          return (
            <button onClick={() => nav("goals")} className="w-full rounded-2xl p-4 text-left transition-all active:scale-[0.98]"

                  <span style={{fontSize:18}}>{done?"🎉":"🎯"}</span>
                  <span className="text-sm font-bold" style={{color:"var(--tx)"}}>

                <span className="text-xs font-bold" style={{color: done?"#6BCB77":"var(--acc)"}}>{pct}%</span>

            </button>

        // 2) Reduktions-Limit
        if (hasGoal && goals.goalType === "limit" && goals.maxPerWeek) {
          const ws = new Date(); ws.setDate(ws.getDate() - ws.getDay() + 1); ws.setHours(0,0,0,0);
          const weekCount = logs.filter(l => new Date(l.date) >= ws).length;
          const ok = weekCount <= goals.maxPerWeek;
          const pct = Math.min(100, Math.round(weekCount / goals.maxPerWeek * 100));
          return (
            <button onClick={() => nav("goals")} className="w-full rounded-2xl p-4 text-left transition-all active:scale-[0.98]"
              style={{background:"var(--card)", border:`1px solid ${ok?"#6BCB7733":"#E06B8A33"}`}}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span style={{fontSize:18}}>{ok?"✅":"⚠️"}</span>
                  <span className="text-sm font-bold" style={{color:"var(--tx)"}}>
                    {weekCount} / {goals.maxPerWeek} Konsumtage diese Woche
                  </span>
                </div>
                <span className="text-xs font-bold" style={{color: ok?"#6BCB77":"#E06B8A"}}>
                  {ok ? `${goals.maxPerWeek - weekCount} übrig` : "Limit erreicht"}
                </span>
              </div>
              <div className="w-full h-2 rounded-full" style={{background:"var(--bdr)"}}>
                <div className="h-2 rounded-full transition-all duration-700"
                  style={{width:`${pct}%`, background: ok?"#6BCB77":"#E06B8A"}} />
              </div>
              <p className="text-xs mt-2" style={{color:"var(--tx2)"}}>
                {ok ? "Du bist im Rahmen. Weiter so." : "Reflektiere, was du anpassen kannst."}
              </p>
            </button>
          );
        }

        // 3) Streak mit Meilenstein
        if (streak > 0 && nextStreakMs) {
          const pct = Math.round(streak / nextStreakMs * 100);
          return (
            <button onClick={() => nav("goals")} className="w-full rounded-2xl p-4 text-left transition-all active:scale-[0.98]"
              style={{background:"var(--card)", border:"1px solid #6BCB7733"}}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span style={{fontSize:18}}>{streak>=7?"🔥":streak>=3?"⭐":"🌱"}</span>
                  <span className="text-sm font-bold" style={{color:"var(--tx)"}}>
                    {streak} {streak===1?"Tag":"Tage"} clean
                  </span>
                </div>
                <span className="text-xs font-bold" style={{color:"#6BCB77"}}>{nextStreakMs} Tage-Ziel</span>
              </div>
              <div className="w-full h-2 rounded-full" style={{background:"var(--bdr)"}}>
                <div className="h-2 rounded-full transition-all duration-700"
                  style={{width:`${pct}%`, background:"#6BCB77"}} />
              </div>
              <p className="text-xs mt-2" style={{color:"var(--tx2)"}}>
                Noch {nextStreakMs - streak} {nextStreakMs - streak === 1 ? "Tag" : "Tage"} bis zum nächsten Meilenstein
                {longest > streak ? ` · Rekord: ${longest} Tage` : ""}
              </p>
            </button>
          );
        }

        // 4) KB-Fortschritt (Fallback)
        if (kbRead < KB_MODULES.length) {
          const next = KB_MODULES.find(m => !kbProgress.read?.[m.id]);
          const pct = Math.round(kbRead / KB_MODULES.length * 100);
          return (
            <button onClick={() => nav("wissen")} className="w-full rounded-2xl p-4 text-left transition-all active:scale-[0.98]"

                    {kbRead} / {KB_MODULES.length} Module gelesen

                </div>
                <span className="text-xs font-bold" style={{color:"var(--acc)"}}>{pct}%</span>
              </div>
              <div className="w-full h-2 rounded-full" style={{background:"var(--bdr)"}}>
                <div className="h-2 rounded-full transition-all duration-700"

                <p className="text-xs mt-2" style={{color:"var(--tx2)"}}>
                  Nächstes: {next.icon} {next.title} · {next.readMin} Min.
                </p>

            </button>
          );
        }

        return null;
      })()}

      {/* ── Clean Days + Streak ── */}
      {(goals.cleanDays?.length || 0) > 0 && (
        <div className="grid grid-cols-2 gap-3">
          <button onClick={() => nav("goals")} className="rounded-2xl p-4 text-center transition-all active:scale-[0.97]"

          </button>
          <button onClick={() => nav("goals")} className="rounded-2xl p-4 text-center transition-all active:scale-[0.97]"
            style={{background: streak > 0 ? "linear-gradient(135deg,#F2D38812,#E8A87C12)" : "var(--card)",
                    border: streak > 0 ? "1px solid #F2D38844" : "1px solid var(--bdr)"}}>
            <p className="text-3xl font-black"
              style={{color: streak > 0 ? "#F2D388" : "var(--tx2)", fontFamily:"var(--fontD)"}}>
              {streak}
            </p>
            <p className="text-xs font-semibold mt-1" style={{color: streak > 0 ? "#F2D388" : "var(--tx2)"}}>
              {streak === 1 ? "Tag" : "Tage"} Streak
            </p>
            <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>
              {streak >= 7 ? "🔥" : streak >= 3 ? "⭐" : streak > 0 ? "🌱" : "—"} aktuell
            </p>
          </button>
        </div>
      )}
      {logs.length===0 && (goals.cleanDays?.length||0)===0 && !moodDone && (
        <div className="rounded-2xl p-5 text-center" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
          <p className="text-2xl mb-2">🌱</p>
          <p className="text-sm font-semibold" style={{color:"var(--tx)"}}>Willkommen bei DoseDiary</p>
          <p className="text-xs mt-2 leading-relaxed" style={{color:"var(--tx2)"}}>Dein privater Raum für bewussten Umgang. Kein Urteil, kein Druck — nur Klarheit.</p>
        </div>
      )}

      {/* ── Meine Auswertungen ── */}
      <button onClick={() => nav("analysis")}
        className="w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all active:scale-[0.99]"
        style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
        <span style={{fontSize:18}}>📊</span>
        <span className="flex-1 text-sm font-bold text-left" style={{color:"var(--tx)"}}>Meine Auswertungen</span>
        <span style={{fontSize:16,color:"var(--tx2)"}}>›</span>
      </button>
    </div>
    );
  };

  // ─── DOSE LOG ───
  // ─── WIZARD SHELL (shared progress bar + back button) ──────────────────
  const WizardShell = ({ step, total, label, onBack, children }) => (
    <div className="space-y-5 animate-fadeIn">
      <div>
        <div className="flex justify-between items-center mb-1.5">
          <span style={{fontSize:11,color:"var(--tx2)",fontWeight:600,letterSpacing:"0.4px"}}>SCHRITT {step} VON {total}</span>
          {label && <span style={{fontSize:11,color:"var(--acc)",fontWeight:700}}>{label}</span>}
        </div>
        <div className="flex gap-1">
          {Array.from({length:total}).map((_,i)=>(
            <div key={i} className="h-1 flex-1 rounded-full transition-all duration-400"
              style={{background:i<step?"var(--acc)":"var(--bdr)"}}/>
          ))}
        </div>
      </div>
      {children}
      {onBack && (
        <button onClick={onBack} className="w-full py-3.5 rounded-2xl text-sm font-medium"
          style={{background:"var(--card2)",color:"var(--tx2)",border:"1px solid var(--bdr)"}}>
          ← Zurück
        </button>
      )}
    </div>
  );

  const WizardDone = ({ icon, msg, onClose }) => (
    <div className="animate-fadeIn flex flex-col items-center justify-center py-14 space-y-5">
      <div className="w-24 h-24 rounded-full flex items-center justify-center"
        style={{background:"#6BCB7712",border:"2px solid #6BCB7744",fontSize:48}}>{icon}</div>
      <p className="text-xl font-bold text-center px-4" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>{msg}</p>
      <button onClick={onClose} className="mt-2 px-10 py-4 rounded-2xl text-base font-bold"
        style={{background:"linear-gradient(135deg,var(--acc),#6272C4)",color:"#fff",boxShadow:"0 4px 20px var(--acc)33"}}>
        Fertig
      </button>
    </div>
  );

  // ─── DOSE-LOG WIZARD ──────────────────────────────────────────────────────
  const DoseLog = () => {
    const [step,       setStep]      = useState(1);
    const [sub,        setSub]       = useState("");
    const [amt,        setAmt]       = useState("");
    const [unit,       setUnit]      = useState("mg");
    const [mood,       setMood]      = useState(null);
    const [craving,    setCraving]   = useState(5);
    const [setting,    setSetting]   = useState("");
    const [note,       setNote]      = useState("");
    const [retroMode,  setRetroMode] = useState(false);
    const [retroDate,  setRetroDate] = useState(()=>new Date().toISOString().split("T")[0]);
    const [retroTime,  setRetroTime] = useState(()=>{const n=new Date();return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;});
    const [showAll,    setShowAll]   = useState(false);
    const [saved,      setSaved]     = useState(false);
    const [showSafer,  setShowSafer] = useState(false);

    const isBehavior = ALL_ITEMS.find(i=>i.id===sub)?.cat==="beh";
    const myItems    = prefs.mySubs?.length>0 ? prefs.mySubs : SUBSTANCES;
    const items      = showAll ? SUBSTANCES : myItems;

    const recent24h  = logs.filter(l=>Date.now()-new Date(l.date).getTime()<864e5).map(l=>l.substance).filter((v,i,a)=>a.indexOf(v)===i);
    const mixWarns   = sub ? findMixWarnings(sub, recent24h) : [];
    const info       = sub ? SUB_INFO[sub] : null;
    const timerData  = sub && SAFER_TIMERS[sub] ? SAFER_TIMERS[sub] : null;
    const lastLog    = timerData ? [...logs].reverse().find(l=>l.substance===sub) : null;
    const hoursSince = lastLog ? (Date.now()-new Date(lastLog.date).getTime())/3600000 : Infinity;
    const timerActive= timerData && hoursSince < timerData.hours;

    const levelStyles = {
      critical:{bg:"#1a0508",border:"#FF3B3B",badge:"#FF3B3B",label:"⛔ LEBENSGEFAHR",callBg:"#FF3B3B",callText:"#fff"},
      high:    {bg:"#1a0d00",border:"#FF8C00",badge:"#FF8C00",label:"🔶 HOHES RISIKO", callBg:"var(--card2)",callText:"#FF8C00"},
      medium:  {bg:"#15120a",border:"#FFD700",badge:"#FFD700",label:"🟡 VORSICHT",      callBg:"var(--card2)",callText:"#FFD700"},
    };

    const doSave = async () => {
      if (!sub || (!isBehavior && !amt)) return;
      const entryDate = retroMode
        ? new Date(`${retroDate}T${retroTime}:00`).toISOString()
        : new Date().toISOString();
      const entry = {
        id:Date.now(), substance:sub,
        amount:isBehavior?parseFloat(amt||"0"):parseFloat(amt),
        unit:isBehavior?"Min.":unit,
        setting:setting||"Nicht angegeben", note, craving,
        moodLabel:mood?.label||null, date:entryDate,
        type:isBehavior?"behavior":"substance",
        retroactive:retroMode||undefined,
      };
      await save("dd_logs", setLogs, [...logs, entry]);
      setSaved(true);
    };

    const reset = () => {
      setSub(""); setAmt(""); setUnit("mg"); setMood(null); setCraving(5);
      setSetting(""); setNote(""); setSaved(false); setStep(1); setRetroMode(false);
    };

    if (saved) return (
      <WizardDone icon="🌿" msg="Danke für deine Ehrlichkeit!" onClose={()=>{reset();nav("dashboard");}} />
    );

    // ── Schritt 1: Substanzwahl ──────────────────────────────────
    if (step===1) return (
      <WizardShell step={1} total={5} label="Was loggst du?" onBack={null}>
        <div className="text-center">
          <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>Was möchtest du loggen?</p>
          <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>Wertfrei. Nur für dich.</p>
        </div>

        <div className="grid grid-cols-2 gap-3">
          {items.map(s=>(
            <button key={s}
              onClick={()=>{setSub(s);setTimeout(()=>setStep(2),160);}}
              className="rounded-2xl flex flex-col items-center justify-center gap-2 transition-all active:scale-95"
              style={{padding:"20px 12px",minHeight:88,
                background:sub===s?"var(--acc)20":"var(--card)",
                border:`2px solid ${sub===s?"var(--acc)":"var(--bdr)"}`}}>
              <span style={{fontSize:28}}>{subEmoji(s)}</span>
              <span style={{fontSize:12,fontWeight:600,color:"var(--tx)",textAlign:"center",lineHeight:1.3}}>{s}</span>
            </button>
          ))}
        </div>

        {prefs.mySubs?.length>0 && (
          <button onClick={()=>setShowAll(!showAll)} className="text-xs font-medium text-center w-full" style={{color:"var(--acc)"}}>
            {showAll?"Nur meine Auswahl ▴":`Alle anzeigen (${SUBSTANCES.length}) ▾`}
          </button>
        )}

        <div className="rounded-xl overflow-hidden" style={{background:"var(--card2)",border:"1px solid var(--bdr)"}}>
          <div className="flex items-center justify-between px-4 py-2.5">
            <span className="text-xs" style={{color:"var(--tx2)"}}>🕐 {retroMode?"Nachträglicher Eintrag":"Zeitpunkt: Jetzt"}</span>
            <button onClick={()=>setRetroMode(!retroMode)} className="text-xs font-medium px-2.5 py-1 rounded-lg"
              style={{background:retroMode?"var(--acc)":"var(--card)",color:retroMode?"#fff":"var(--tx2)"}}>
              {retroMode?"Zurücksetzen":"Datum ändern"}
            </button>
          </div>
          {retroMode && (
            <div className="px-4 pb-3 flex gap-3">
              <div className="flex-1">
                <label className="text-xs mb-1 block" style={{color:"var(--tx2)"}}>Datum</label>
                <input type="date" value={retroDate} onChange={e=>setRetroDate(e.target.value)}
                  max={new Date().toISOString().split("T")[0]}
                  className="w-full rounded-lg px-3 py-2 text-sm outline-none"
                  style={{background:"var(--card)",color:"var(--tx)",border:"1px solid var(--bdr)",colorScheme:"dark"}}/>
              </div>
              <div className="w-28">
                <label className="text-xs mb-1 block" style={{color:"var(--tx2)"}}>Uhrzeit</label>
                <input type="time" value={retroTime} onChange={e=>setRetroTime(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm outline-none"
                  style={{background:"var(--card)",color:"var(--tx)",border:"1px solid var(--bdr)",colorScheme:"dark"}}/>
              </div>
            </div>
          )}
        </div>
      </WizardShell>
    );

    // ── Schritt 2: Menge + Einheit ───────────────────────────────
    if (step===2) return (
      <WizardShell step={2} total={5} label={`${subEmoji(sub)} ${sub}`} onBack={()=>setStep(1)}>
        <div className="text-center">
          <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>Welche Menge?</p>
        </div>

        {/* Substanz-Info kompakt */}
        {info && (
          <div className="rounded-xl px-4 py-3 flex gap-3 items-center animate-fadeIn"
            style={{background:`${info.riskColor||"var(--acc)"}10`,border:`1px solid ${info.riskColor||"var(--acc)"}33`}}>
            <span style={{fontSize:22}}>{subEmoji(sub)}</span>
            <div className="flex-1">
              <span className="text-xs font-bold" style={{color:info.riskColor}}>Risiko: {info.risk}</span>
              <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>⏱️ {info.onset} · ⏳ {info.duration}</p>
            </div>
            <button onClick={()=>setShowSafer(!showSafer)} className="text-xs font-medium px-2 py-1 rounded-lg"
              style={{background:"var(--card2)",color:"var(--tx2)"}}>Safer Use {showSafer?"▴":"▾"}</button>
          </div>
        )}
        {showSafer && info && (
          <div className="rounded-xl px-4 py-3 space-y-1 animate-fadeIn" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
            {info.safer.slice(0,3).map((t,i)=><p key={i} className="text-xs" style={{color:"var(--tx2)"}}>• {t}</p>)}
          </div>
        )}

        {/* Safer-Use Timer */}
        {timerActive && (
          <div className="rounded-xl px-4 py-3 animate-fadeIn" style={{background:`${timerData.color}08`,border:`1px solid ${timerData.color}33`}}>
            <p className="text-xs font-bold" style={{color:timerData.color}}>
              ⏳ {timerData.label}: Noch {Math.ceil(timerData.hours-hoursSince)} Std. empfohlen
            </p>
            <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>{timerData.desc}</p>
          </div>
        )}

        {/* Mix-Warnung */}
        {mixWarns.length>0 && (()=>{
          const w=mixWarns[0]; const sty=levelStyles[w.level]||levelStyles.medium; const isCrit=w.level==="critical"; const isHigh=w.level==="high";
          return (
            <div className={`rounded-2xl overflow-hidden${isCrit?" warn-critical":""}`} style={{background:sty.bg,border:`2px solid ${sty.border}`}}>
              <div className="px-4 py-3 flex items-center gap-2" style={{borderBottom:`1px solid ${sty.border}44`}}>
                <span className="text-xs font-black px-2 py-0.5 rounded-lg" style={{background:`${sty.badge}20`,color:sty.badge}}>{sty.label}</span>
                <span className="text-xs font-bold" style={{color:"var(--tx)"}}>{subEmoji(sub)} {sub} + {subEmoji(w.sub)} {w.sub}</span>
              </div>
              <div className="px-4 py-3">
                <p className="text-sm font-bold" style={{color:sty.badge}}>{w.text}</p>
                <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>→ {w.advice}</p>
              </div>
              {(isCrit||isHigh)&&<div className="px-4 pb-3">
                <a href="tel:112" className="flex items-center justify-center gap-2 w-full py-3 rounded-xl font-black text-sm"
                  style={{background:sty.callBg,color:sty.callText,border:isCrit?"none":`2px solid ${sty.badge}`,textDecoration:"none"}}>
                  📞 {isCrit?"NOTFALL → 112 ANRUFEN":"Notfall → 112"}
                </a>
                {isCrit&&<p className="text-center text-xs mt-1.5" style={{color:"var(--tx2)"}}>Giftnotruf: <strong style={{color:"var(--tx)"}}>030 19240</strong></p>}
              </div>}
            </div>
          );
        })()}

        {isBehavior ? (
          <div>
            <label className="text-xs font-medium mb-2 block" style={{color:"var(--tx2)"}}>Dauer (optional)</label>
            <div className="flex items-center gap-3">
              <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} inputMode="numeric" autoFocus
                className="flex-1 rounded-2xl px-5 py-5 text-3xl font-bold outline-none text-center"
                style={{background:"var(--card)",color:"var(--tx)",border:"2px solid var(--bdr)"}} placeholder="0"/>
              <span className="text-sm font-medium" style={{color:"var(--tx2)"}}>Min.</span>
            </div>
          </div>
        ):(
          <div className="space-y-4">
            <div>
              <label className="text-xs font-medium mb-2 block" style={{color:"var(--tx2)"}}>Menge</label>
              <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} inputMode="decimal" autoFocus
                className="w-full rounded-2xl px-5 py-5 text-3xl font-bold outline-none text-center"
                style={{background:"var(--card)",color:"var(--tx)",border:"2px solid var(--bdr)"}} placeholder="0"/>
            </div>
            <div>
              <label className="text-xs font-medium mb-2 block" style={{color:"var(--tx2)"}}>Einheit</label>
              <div className="grid grid-cols-4 gap-2">
                {UNITS.map(u=>(
                  <button key={u} onClick={()=>setUnit(u)}
                    className="py-3 rounded-xl text-sm font-semibold transition-all active:scale-95"
                    style={{background:unit===u?"var(--acc)":"var(--card)",color:unit===u?"#fff":"var(--tx2)",border:`1px solid ${unit===u?"var(--acc)":"var(--bdr)"}`}}>
                    {u}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        <div>
          <div className="flex justify-between items-center mb-2">
            <label className="text-xs font-medium" style={{color:"var(--tx2)"}}>{isBehavior?"Drang-Level":"Craving-Level"}</label>
            <span className="text-sm font-bold" style={{color:"var(--acc)"}}>{craving}/10</span>
          </div>
          <input type="range" min="0" max="10" value={craving} onChange={e=>setCraving(+e.target.value)}
            className="w-full" style={{accentColor:"var(--acc)"}}/>
          <div className="flex justify-between text-xs mt-1" style={{color:"var(--tx2)"}}><span>Kein Verlangen</span><span>Sehr stark</span></div>
        </div>

        <button onClick={()=>setStep(3)} disabled={!isBehavior&&!amt}
          className="w-full py-4 rounded-2xl text-base font-bold transition-all active:scale-[0.98]"
          style={{
            background:(!isBehavior&&!amt)?"var(--bdr)":"linear-gradient(135deg,var(--acc),#6272C4)",
            color:(!isBehavior&&!amt)?"var(--tx2)":"#fff",
          }}>
          Weiter →
        </button>
      </WizardShell>
    );

    // ── Schritt 3: Stimmung ──────────────────────────────────────
    if (step===3) return (
      <WizardShell step={3} total={5} label="Stimmung" onBack={()=>setStep(2)}>
        <p className="text-2xl font-bold text-center" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>Wie ist deine Stimmung?</p>
        <div className="grid grid-cols-5 gap-2 mt-2">
          {MOODS.map(m=>(
            <button key={m.value}
              onClick={()=>{setMood(m);setTimeout(()=>setStep(4),200);}}
              className="flex flex-col items-center gap-1.5 rounded-2xl transition-all active:scale-95"
              style={{padding:"16px 4px",
                background:mood?.value===m.value?`${m.color}20`:"var(--card)",
                border:`2px solid ${mood?.value===m.value?m.color:"var(--bdr)"}`}}>
              <span style={{fontSize:30}}>{m.emoji}</span>
              <span style={{fontSize:10,fontWeight:600,color:mood?.value===m.value?m.color:"var(--tx2)"}}>{m.label}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>setStep(4)} className="w-full py-3.5 rounded-2xl text-sm font-medium"
          style={{background:"var(--card2)",color:"var(--tx2)",border:"1px solid var(--bdr)"}}>
          Überspringen →
        </button>
      </WizardShell>
    );

    // ── Schritt 4: Setting & Notizen ─────────────────────────────
    if (step===4) return (
      <WizardShell step={4} total={5} label="Setting" onBack={()=>setStep(3)}>
        <p className="text-2xl font-bold text-center" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>Setting & Notizen</p>
        <div className="space-y-4">
          <div>
            <label className="text-xs font-medium mb-2 block" style={{color:"var(--tx2)"}}>Wo bist du gerade?</label>
            <div className="grid grid-cols-2 gap-2">
              {SETTINGS_OPT.map(s=>(
                <button key={s} onClick={()=>setSetting(s)}
                  className="py-4 px-3 rounded-xl text-xs font-medium text-left transition-all active:scale-95"
                  style={{background:setting===s?"var(--acc)20":"var(--card)",
                    border:`1.5px solid ${setting===s?"var(--acc)":"var(--bdr)"}`,
                    color:setting===s?"var(--acc)":"var(--tx2)"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-xs font-medium mb-2 block" style={{color:"var(--tx2)"}}>Notiz (optional)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              className="w-full rounded-2xl px-4 py-3 text-sm outline-none resize-none"
              style={{background:"var(--card)",color:"var(--tx)",border:"1px solid var(--bdr)"}}
              placeholder="Situation, Trigger, Gedanken…"/>
          </div>
        </div>
        <button onClick={()=>setStep(5)}
          className="w-full py-4 rounded-2xl text-base font-bold"
          style={{background:"linear-gradient(135deg,var(--acc),#6272C4)",color:"#fff"}}>
          Zur Zusammenfassung →
        </button>
      </WizardShell>
    );

    // ── Schritt 5: Zusammenfassung & Speichern ───────────────────
    if (step===5) return (
      <WizardShell step={5} total={5} label="Zusammenfassung" onBack={()=>setStep(4)}>
        <p className="text-2xl font-bold text-center" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>Alles korrekt?</p>

        <div className="rounded-2xl overflow-hidden" style={{border:"1px solid var(--bdr)"}}>
          {[
            {l:"Substanz",  v:`${subEmoji(sub)} ${sub}`},
            ...(!isBehavior?[{l:"Menge",v:`${amt} ${unit}`}]:amt?[{l:"Dauer",v:`${amt} Min.`}]:[]),
            {l:"Craving",   v:`${craving}/10`},
            ...(mood?[{l:"Stimmung",v:`${mood.emoji} ${mood.label}`}]:[]),
            {l:"Setting",   v:setting||"Nicht angegeben"},
            ...(note?[{l:"Notiz",v:note}]:[]),
            ...(retroMode?[{l:"Zeitpunkt",v:`${new Date(retroDate).toLocaleDateString("de-DE",{day:"numeric",month:"short"})} · ${retroTime} Uhr`}]:[]),
          ].map((row,i)=>(
            <div key={i} className="flex items-start gap-3 px-4 py-3"
              style={{borderBottom:"1px solid var(--bdr)",background:i%2===0?"var(--card)":"var(--card2)"}}>
              <span className="text-xs font-bold shrink-0 w-20" style={{color:"var(--tx2)"}}>{row.l}</span>
              <span className="text-xs" style={{color:"var(--tx)",wordBreak:"break-word"}}>{row.v}</span>
            </div>
          ))}
        </div>

        {mixWarns.length>0 && (
          <div className="rounded-xl px-4 py-3" style={{background:"#FF3B3B10",border:"1px solid #FF3B3B44"}}>
            <p className="text-xs font-bold" style={{color:"#FF3B3B"}}>⚠️ Mischkonsum-Warnung beachten!</p>
            <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>{mixWarns[0].text}</p>
          </div>
        )}

        <button onClick={doSave}
          className="w-full py-5 rounded-2xl text-base font-black transition-all active:scale-[0.97]"
          style={{background:"linear-gradient(135deg,#6BCB77,#4aaa58)",color:"#fff",boxShadow:"0 4px 20px #6BCB7733"}}>
          ✅ Eintrag speichern
        </button>
      </WizardShell>
    );

    return null;
  };
  const Analysis = () => {
    const [range, setRange] = React.useState("week");
    const now = new Date();
    const cutoff = range === "week"
      ? new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6)
      : range === "month"
      ? new Date(now.getFullYear(), now.getMonth(), now.getDate() - 29)
      : new Date(0);
    const fLogs  = logs.filter(l => new Date(l.date) >= cutoff);
    const fMoods = moods.filter(m => new Date(m.date) >= cutoff);
    const rangeLabel = range === "week" ? "7 Tage" : range === "month" ? "30 Tage" : "Gesamt";
    const hasLogs = fLogs.length > 0;
    const avgMoodVal = fMoods.length ? fMoods.reduce((s,m) => s+m.value,0)/fMoods.length : null;
    const avgMoodEmoji = avgMoodVal ? (MOODS.find(m => m.value === Math.round(avgMoodVal))?.emoji||"–") : null;
    const topSub  = hasLogs ? mostCommon(fLogs.map(l => l.substance)) : null;
    const bd = byDay(fLogs);

            <div className="flex flex-wrap gap-1.5">
              {BEH_ITEMS.map(s => (
                <button key={s} onClick={async () => {
                  const sel = prefs.mySubs || [];
                  const next = sel.includes(s) ? sel.filter(x => x !== s) : [...sel, s];
                  await savePrefs({ ...prefs, mySubs: next });
                }} className="px-2.5 py-1 rounded-full text-xs font-medium transition-all"
                  style={{background:(prefs.mySubs||[]).includes(s)?"#F2D388":"var(--card2)",color:(prefs.mySubs||[]).includes(s)?"#1a1a2e":"var(--tx2)",border:`1px solid ${(prefs.mySubs||[]).includes(s)?"#F2D388":"var(--bdr)"}`}}>
                  {subEmoji(s)} {s}
                </button>
              ))}
            </div>
          </div>
          <p className="text-xs mt-3" style={{color:"var(--acc)"}}>{(prefs.mySubs||[]).length} ausgewählt</p>
        </Card>

        {/* Reset incl. Onboarding */}
        <Card>
          <h3 className="text-sm font-bold mb-2" style={{color:"var(--tx)"}}>🔄 App zurücksetzen</h3>
          <p className="text-xs mb-3" style={{color:"var(--tx2)"}}>Löscht alle Daten und zeigt das Onboarding erneut an.</p>
          {!confirmReset ? (
            <button onClick={() => setConfirmReset(true)} className="w-full py-2 rounded-xl text-xs font-medium" style={{background:"var(--card2)",color:"var(--tx2)",border:"1px solid var(--bdr)"}}>
              App vollständig zurücksetzen
            </button>
          ) : (
            <div className="flex gap-2">
              <button onClick={() => setConfirmReset(false)} className="flex-1 py-2 rounded-xl text-xs" style={{background:"var(--card)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>Abbrechen</button>
              <button onClick={resetOnboarding} className="flex-1 py-2 rounded-xl text-xs font-bold" style={{background:"#E06B8A",color:"#fff"}}>Zurücksetzen</button>
            </div>
          )}
        </Card>

        {/* Version */}
        <div className="text-center py-4">
          <p className="text-xs" style={{color:"var(--tx2)"}}>DoseDiary v1.1 · Harm Reduction · Akzeptierende Begleitung</p>
          <p className="text-xs mt-1" style={{color:"var(--bdr)"}}>Persistent Storage (IndexedDB-Äquivalent) · Kein 5MB-Limit · Kein Server</p>
        </div>
      </div>
    );
  };

  // ─── GOALS & CLEAN DAYS ───
  const Goals = () => {
    const [tab, setTab] = [goalTab, setGoalTab]; // App-Level State
    const streak = calcStreak(goals.cleanDays || [], logs);
    const longest = calcLongestStreak(goals.cleanDays || []);
    const progress = calcGoalProgress(goals, logs);
    const todayClean = goals.cleanDays?.includes(todayStr());
    const totalClean = goals.cleanDays?.length || 0;

    // Target setup
    const [editGoal, setEditGoal] = useState(false);
    const [goalType, setGoalType] = useState(goals.goalType || "clean"); // "clean" | "limit"
    const [newTarget, setNewTarget] = useState(goals.target || 30);
    const [newMaxPerWeek, setNewMaxPerWeek] = useState(goals.maxPerWeek || 3);
    const [newTargetSubs, setNewTargetSubs] = useState(goals.targetSubs || []);
    // retroCleanOpen + retroCleanDate leben im App-Level State

    const handleCleanDay = async () => {
      const t = todayStr();
      const updated = todayClean
        ? { ...goals, cleanDays: goals.cleanDays.filter(d => d !== t) }
        : { ...goals, cleanDays: [...(goals.cleanDays || []), t] };
      await saveGoals(updated);
    };

    // Toggle clean day for ANY date (past or today)
    const toggleCleanDate = async (ds) => {
      if (!ds) return;
      const isSet = goals.cleanDays?.includes(ds);
      const updated = isSet
        ? { ...goals, cleanDays: goals.cleanDays.filter(d => d !== ds) }
        : { ...goals, cleanDays: [...(goals.cleanDays || []), ds] };
      await saveGoals(updated);
    };

    const saveTarget = async () => {
      const updated = { ...goals, goalType, target: goalType === "clean" ? newTarget : null, maxPerWeek: goalType === "limit" ? newMaxPerWeek : null, targetSubs: newTargetSubs, startDate: goals.startDate || todayStr() };
      await saveGoals(updated);
      setEditGoal(false);
    };

    const resetGoal = async () => {
      await saveGoals({ ...goals, target: null, maxPerWeek: null, goalType: "clean", targetSubs: [], startDate: null });
      setEditGoal(false);
    };

    // Harm-Reduction: consumption this week
    const weekConsumption = () => {
      const s = new Date(); s.setDate(s.getDate() - s.getDay() + 1); s.setHours(0,0,0,0);
      const weekLogs = logs.filter(l => new Date(l.date) >= s);
      if (goals.targetSubs?.length) return weekLogs.filter(l => goals.targetSubs.includes(l.substance)).length;
      return weekLogs.length;
    };

    // Calendar for last 5 weeks
    const calendarWeeks = () => {
      const weeks = [];
      const today = new Date(); today.setHours(0,0,0,0);
      const start = new Date(today); start.setDate(start.getDate() - start.getDay() + 1 - 28);
      const logDates = new Set(logs.map(l => dateStr(l.date)));
      const cleanSet = new Set(goals.cleanDays || []);
      for (let w = 0; w < 5; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const day = new Date(start); day.setDate(day.getDate() + w * 7 + d);
          const ds = dateStr(day);
          const isFuture = day > today;
          const isClean = cleanSet.has(ds);
          const isConsumed = logDates.has(ds);
          const isToday = ds === todayStr();
          week.push({ ds, day: day.getDate(), isFuture, isClean, isConsumed, isToday, month: day.getMonth() });
        }
        weeks.push(week);
      }
      return weeks;
    };

    return (
      <div className="space-y-5">
        {/* Tab bar */}
        <div className="flex rounded-xl overflow-hidden" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
          {[{id:"track",l:"Tagebuch"},{id:"goal",l:"Ziel"},{id:"history",l:"Verlauf"}].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className="flex-1 py-2.5 text-xs font-semibold transition-all"
              style={{background:tab===t.id?"var(--acc)":"transparent",color:tab===t.id?"#fff":"var(--tx2)"}}>
              {t.l}
            </button>
          ))}
        </div>

        {/* ─── TAB: Tagebuch ─── */}
        {tab === "track" && (
          <div className="space-y-5 animate-fadeIn">
            {/* Today Action */}
            <button onClick={handleCleanDay} className="w-full rounded-2xl p-5 text-center transition-all hover:scale-[1.01] active:scale-[0.97]"
              style={{background:todayClean?"linear-gradient(135deg,#6BCB7715,#9B7ECF15)":"var(--card)",border:`2px solid ${todayClean?"#6BCB77":"var(--bdr)"}`}}>
              <span className="text-4xl">{todayClean ? "✅" : "🌟"}</span>
              <p className="text-base font-bold mt-2" style={{color:todayClean?"#6BCB77":"var(--tx)",fontFamily:"var(--fontD)"}}>
                {todayClean ? "Heute als clean markiert" : "Heute als clean markieren"}
              </p>
              <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>
                {todayClean ? "Tippe, um rückgängig zu machen" : "Kein Konsum heute? Feiere das."}
              </p>
            </button>

            {/* Stats Row */}
            <div className="grid grid-cols-3 gap-2">
              <div className="rounded-xl p-3 text-center" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
                <p className="text-2xl font-bold" style={{color:"#6BCB77",fontFamily:"var(--fontD)"}}>{streak}</p>
                <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>Streak</p>
              </div>
              <div className="rounded-xl p-3 text-center" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
                <p className="text-2xl font-bold" style={{color:"var(--acc)",fontFamily:"var(--fontD)"}}>{totalClean}</p>
                <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>Gesamt</p>
              </div>
              <div className="rounded-xl p-3 text-center" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
                <p className="text-2xl font-bold" style={{color:"#F2D388",fontFamily:"var(--fontD)"}}>{longest}</p>
                <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>Rekord</p>
              </div>
            </div>

            {/* Calendar Grid */}
            <Card>
              <h3 className="text-sm font-bold mb-3" style={{color:"var(--tx)"}}>📅 Letzte 5 Wochen</h3>
              <div className="flex justify-between mb-2 px-1">
                {["Mo","Di","Mi","Do","Fr","Sa","So"].map(d => (
                  <span key={d} className="w-9 text-center text-xs font-medium" style={{color:"var(--tx2)"}}>{d}</span>
                ))}
              </div>
              {calendarWeeks().map((week, wi) => (
                <div key={wi} className="flex justify-between mb-1 px-1">
                  {week.map((d, di) => (
                    <button key={di} onClick={() => !d.isFuture && toggleCleanDate(d.ds)} disabled={d.isFuture}
                      className="w-9 h-9 rounded-lg flex items-center justify-center text-xs font-medium transition-all active:scale-90"
                      style={{
                        background: d.isFuture ? "transparent" : d.isClean ? "#6BCB7722" : d.isConsumed ? "#E06B8A18" : "var(--card2)",
                        border: d.isToday ? "2px solid var(--acc)" : "1px solid transparent",
                        color: d.isFuture ? "var(--bdr)" : d.isClean ? "#6BCB77" : d.isConsumed ? "#E06B8A" : "var(--tx2)",
                        opacity: d.isFuture ? 0.3 : 1,
                        cursor: d.isFuture ? "default" : "pointer",
                      }}>
                      {d.isClean && !d.isFuture ? "✓" : d.day}
                    </button>
                  ))}
                </div>
              ))}
              <div className="flex items-center gap-4 mt-3 justify-center">
                <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded" style={{background:"#6BCB7722",border:"1px solid #6BCB7744"}} /><span className="text-xs" style={{color:"var(--tx2)"}}>Clean</span></div>
                <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded" style={{background:"#E06B8A18",border:"1px solid #E06B8A33"}} /><span className="text-xs" style={{color:"var(--tx2)"}}>Konsum</span></div>
                <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded" style={{background:"var(--card2)"}} /><span className="text-xs" style={{color:"var(--tx2)"}}>Kein Eintrag</span></div>
              </div>
              <p className="text-xs text-center mt-2" style={{color:"var(--tx2)"}}>Tippe auf einen Tag, um ihn als clean zu markieren oder rueckgaengig zu machen.</p>
            </Card>

            {/* Retro Clean Day — Monatskalender */}
            <div className="rounded-2xl overflow-hidden" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
              <button onClick={() => setRetroCleanOpen(!retroCleanOpen)} className="w-full px-4 py-3 flex items-center justify-between text-left">
                <div className="flex items-center gap-2">
                  <span className="text-sm">🗓️</span>
                  <span className="text-xs font-semibold" style={{color:"var(--tx)"}}>Vergangene Tage nachträglich markieren</span>
                </div>
                <span className="text-xs" style={{color:"var(--acc)"}}>{retroCleanOpen ? "▴" : "▾"}</span>
              </button>
              {retroCleanOpen && (() => {
                const retroYM = retroCleanDate;
                const setRetroYM = setRetroCleanDate;

                const [ry, rm] = retroYM.split("-").map(Number);
                const firstDay = new Date(ry, rm-1, 1);
                const lastDay = new Date(ry, rm, 0);
                const today = new Date(); today.setHours(0,0,0,0);
                const cleanSet = new Set(goals.cleanDays || []);

                // Alle Tage des Monats aufbauen
                const days = [];
                // Leere Felder vor dem 1. (Mo=0)
                const startDow = (firstDay.getDay() + 6) % 7;
                for (let i = 0; i < startDow; i++) days.push(null);
                for (let d = 1; d <= lastDay.getDate(); d++) {
                  const date = new Date(ry, rm-1, d);
                  const ds = dateStr(date);
                  days.push({ d, ds, isFuture: date > today, isClean: cleanSet.has(ds) });
                }

                const monthCleanCount = days.filter(d => d && d.isClean).length;
                const monthTotal = days.filter(d => d && !d.isFuture).length;

                // Monat komplett als clean markieren / aufheben
                const markMonthAll = async () => {
                  const pastDays = days.filter(d => d && !d.isFuture).map(d => d.ds);
                  const allClean = pastDays.every(ds => cleanSet.has(ds));
                  let newClean = [...(goals.cleanDays || [])];
                  if (allClean) {
                    newClean = newClean.filter(d => !pastDays.includes(d));
                  } else {
                    pastDays.forEach(ds => { if (!newClean.includes(ds)) newClean.push(ds); });
                  }
                  await saveGoals({ ...goals, cleanDays: newClean });
                };

                const prevMonth = () => {
                  const d = new Date(ry, rm-2, 1);
                  setRetroYM(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
                };
                const nextMonth = () => {
                  const d = new Date(ry, rm, 1);
                  if (d <= today) setRetroYM(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
                };
                const isNextDisabled = new Date(ry, rm, 1) > today;
                const monthLabel = firstDay.toLocaleDateString("de-DE", { month:"long", year:"numeric" });
                const allPastClean = days.filter(d => d && !d.isFuture).every(d => d.isClean);

                return (
                  <div className="px-4 pb-4 pt-1 animate-fadeIn">
                    {/* Monats-Navigation */}
                    <div className="flex items-center justify-between mb-3">
                      <button onClick={prevMonth} className="w-9 h-9 rounded-xl flex items-center justify-center text-base font-bold transition-all active:scale-90"
                        style={{background:"var(--card2)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>‹</button>
                      <div className="text-center">
                        <p className="text-sm font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>{monthLabel}</p>
                        <p className="text-xs" style={{color:"var(--tx2)"}}>{monthCleanCount} / {monthTotal} Tage clean</p>
                      </div>
                      <button onClick={nextMonth} disabled={isNextDisabled} className="w-9 h-9 rounded-xl flex items-center justify-center text-base font-bold transition-all active:scale-90"
                        style={{background:"var(--card2)",color:isNextDisabled?"var(--bdr)":"var(--tx)",border:"1px solid var(--bdr)",opacity:isNextDisabled?0.35:1,cursor:isNextDisabled?"default":"pointer"}}>›</button>
                    </div>

                    {/* Wochentag-Header */}
                    <div className="grid mb-1" style={{gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                      {["Mo","Di","Mi","Do","Fr","Sa","So"].map(d => (
                        <div key={d} className="text-center text-xs font-medium" style={{color:"var(--tx2)",paddingBottom:2}}>{d}</div>
                      ))}
                    </div>

                    {/* Tage-Grid */}
                    <div className="grid" style={{gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                      {days.map((d, i) => d === null
                        ? <div key={i} />
                        : (
                          <button key={i} onClick={() => !d.isFuture && toggleCleanDate(d.ds)} disabled={d.isFuture}
                            className="flex items-center justify-center rounded-lg font-medium transition-all active:scale-90"
                            style={{
                              aspectRatio:"1",
                              fontSize:12,
                              background: d.isFuture ? "transparent" : d.isClean ? "#6BCB7722" : "var(--card2)",
                              border: `1.5px solid ${d.isClean ? "#6BCB7766" : "transparent"}`,
                              color: d.isFuture ? "var(--bdr)" : d.isClean ? "#6BCB77" : "var(--tx2)",
                              cursor: d.isFuture ? "default" : "pointer",
                              opacity: d.isFuture ? 0.25 : 1,
                            }}>
                            {d.isClean ? "✓" : d.d}
                          </button>
                        )
                      )}
                    </div>

                    {/* Monat komplett markieren */}
                    <button onClick={markMonthAll} className="w-full mt-3 py-2.5 rounded-xl text-xs font-semibold transition-all active:scale-[0.98]"
                      style={{
                        background: allPastClean ? "#E06B8A12" : "#6BCB7712",
                        color: allPastClean ? "#E06B8A" : "#6BCB77",
                        border: `1px solid ${allPastClean ? "#E06B8A33" : "#6BCB7733"}`,
                      }}>
                      {allPastClean ? `✕ ${monthLabel} komplett zurücksetzen` : `✓ ${monthLabel} komplett als clean markieren`}
                    </button>
                  </div>
                );
              })()}
            </div>

            {/* Motivation */}
            {streak > 0 && (
              <div className="rounded-2xl p-4 text-center" style={{background:"var(--card)",border:"1px solid #6BCB7733"}}>
                <p className="text-xl mb-1">{streak >= 30 ? "🏆" : streak >= 14 ? "💎" : streak >= 7 ? "🔥" : streak >= 3 ? "⭐" : "🌱"}</p>
                <p className="text-sm font-semibold" style={{color:"var(--tx)"}}>
                  {streak >= 30 ? "Ein ganzer Monat!" : streak >= 14 ? "Zwei Wochen stark!" : streak >= 7 ? "Eine Woche geschafft!" : streak >= 3 ? "Drei Tage — das zählt!" : "Jeder Tag zählt."}
                </p>
                <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>Jeder cleane Tag stärkt deine Selbstwirksamkeit.</p>
              </div>
            )}
          </div>
        )}

        {/* ─── TAB: Ziel ─── */}
        {tab === "goal" && (
          <div className="space-y-5 animate-fadeIn">
            {(goals.target || goals.maxPerWeek) && !editGoal ? (
              <>
                {/* Active Goal Display */}
                <div className="rounded-2xl p-5 text-center" style={{background:"linear-gradient(135deg,#6BCB7710,#9B7ECF10)",border:"1px solid #6BCB7733"}}>
                  <p className="text-xs font-bold mb-1" style={{color:"var(--acc)"}}>
                    {goals.goalType === "limit" ? "🎯 HARM-REDUCTION-LIMIT" : "🌟 ABSTINENZ-ZIEL"}
                  </p>
                  <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>
                    {goals.goalType === "limit" ? `Max. ${goals.maxPerWeek} Konsumtage/Woche` : `${goals.target} cleane Tage`}
                  </p>
                  {goals.targetSubs?.length > 0 && (
                    <p className="text-xs mt-2" style={{color:"var(--tx2)"}}>
                      Bezug: {goals.targetSubs.map(s => `${subEmoji(s)} ${s}`).join(", ")}
                    </p>
                  )}
                  <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>Seit {new Date(goals.startDate).toLocaleDateString("de-DE")}</p>
                </div>

                {/* Progress for Clean-Days goal */}
                {goals.goalType === "clean" && progress && (
                  <Card>
                    <div className="flex items-center justify-between mb-3">
                      <span className="text-sm font-bold" style={{color:"var(--tx)"}}>Fortschritt</span>
                      <span className="text-sm font-bold" style={{color:progress.pct>=100?"#6BCB77":"var(--acc)"}}>{progress.pct}%</span>
                    </div>
                    <div className="w-full h-3 rounded-full mb-3" style={{background:"var(--bdr)"}}>
                      <div className="h-3 rounded-full transition-all duration-700" style={{width:`${progress.pct}%`,background:progress.pct>=100?"#6BCB77":"var(--acc)"}} />
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <div><p className="text-lg font-bold" style={{color:"#6BCB77"}}>{progress.cleanInRange}</p><p className="text-xs" style={{color:"var(--tx2)"}}>Clean</p></div>
                      <div><p className="text-lg font-bold" style={{color:"var(--tx)"}}>{progress.totalDays}</p><p className="text-xs" style={{color:"var(--tx2)"}}>Tage</p></div>
                      <div><p className="text-lg font-bold" style={{color:"var(--acc)"}}>{Math.max(0, progress.target - progress.cleanInRange)}</p><p className="text-xs" style={{color:"var(--tx2)"}}>Übrig</p></div>
                    </div>
                    {progress.pct >= 100 && (
                      <div className="mt-3 p-3 rounded-xl text-center" style={{background:"#6BCB7715"}}>
                        <p className="text-xl">🎉</p>
                        <p className="text-sm font-bold mt-1" style={{color:"#6BCB77"}}>Ziel erreicht!</p>
                      </div>
                    )}
                  </Card>
                )}

                {/* Progress for Limit goal */}
                {goals.goalType === "limit" && (
                  <Card>
                    <div className="flex items-center justify-between mb-3">
                      <span className="text-sm font-bold" style={{color:"var(--tx)"}}>Diese Woche</span>
                      <span className="text-sm font-bold" style={{color:weekConsumption() <= goals.maxPerWeek ? "#6BCB77" : "#E06B8A"}}>
                        {weekConsumption()} / {goals.maxPerWeek}
                      </span>
                    </div>
                    <div className="w-full h-3 rounded-full mb-3" style={{background:"var(--bdr)"}}>
                      <div className="h-3 rounded-full transition-all duration-700" style={{
                        width:`${Math.min(100, weekConsumption() / goals.maxPerWeek * 100)}%`,
                        background: weekConsumption() <= goals.maxPerWeek ? "#6BCB77" : "#E06B8A"
                      }} />
                    </div>
                    <p className="text-xs text-center" style={{color:"var(--tx2)"}}>
                      {weekConsumption() <= goals.maxPerWeek
                        ? `✓ Du bist im Rahmen. Noch ${goals.maxPerWeek - weekConsumption()} Konsumtage übrig.`
                        : `⚠️ Limit überschritten. Reflektiere, was du anpassen kannst.`}
                    </p>
                    <p className="text-xs text-center mt-2 italic" style={{color:"var(--tx2)"}}>
                      Reduktion ist auch ein Erfolg. Jeder bewusste Tag zählt.
                    </p>
                  </Card>
                )}

                <div className="flex gap-3">
                  <button onClick={() => { setEditGoal(true); setGoalType(goals.goalType || "clean"); setNewTarget(goals.target || 30); setNewMaxPerWeek(goals.maxPerWeek || 3); setNewTargetSubs(goals.targetSubs || []); }} className="flex-1 py-2.5 rounded-xl text-xs font-medium" style={{background:"var(--card)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>
                    ✏️ Anpassen
                  </button>
                  <button onClick={resetGoal} className="flex-1 py-2.5 rounded-xl text-xs font-medium" style={{background:"#E06B8A12",color:"#E06B8A",border:"1px solid #E06B8A33"}}>
                    Ziel zurücksetzen
                  </button>
                </div>
              </>
            ) : (
              /* ── ZIEL-WIZARD (3 Schritte) ─────────────────────── */
              (() => {
                const [gStep, setGStep] = useState(1);
                const cancelWiz = () => { setEditGoal(false); setGStep(1); };

                // Schritt 1 — Zieltyp
                if (gStep === 1) return (
                  <WizardShell step={1} total={3} label={editGoal ? "Ziel anpassen" : "Ziel setzen"}
                    onBack={editGoal ? cancelWiz : null}>
                    <div className="text-center">
                      <p className="text-3xl mb-2">🎯</p>
                      <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>
                        Was ist dein Ziel?
                      </p>
                      <p className="text-sm mt-1" style={{color:"var(--tx2)"}}>Wähle den Typ, der zu dir passt.</p>
                    </div>

                    <div className="space-y-3 mt-2">
                      <button
                        onClick={() => { setGoalType("clean"); setTimeout(() => setGStep(2), 180); }}
                        className="w-full rounded-2xl p-5 text-left flex items-center gap-4 transition-all active:scale-[0.98]"
                        style={{
                          background: goalType==="clean" ? "var(--acc)15" : "var(--card)",
                          border: `2px solid ${goalType==="clean" ? "var(--acc)" : "var(--bdr)"}`,
                        }}>
                        <span className="text-4xl shrink-0">🌟</span>
                        <div>
                          <p className="text-base font-bold" style={{color:"var(--tx)"}}>Abstinenz-Ziel</p>
                          <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>Eine bestimmte Anzahl cleaner Tage erreichen.</p>
                          <p className="text-xs mt-1 font-semibold" style={{color:"var(--acc)"}}>z.B. 30 cleane Tage bis Ende des Monats</p>
                        </div>
                      </button>

                      <button
                        onClick={() => { setGoalType("limit"); setTimeout(() => setGStep(2), 180); }}
                        className="w-full rounded-2xl p-5 text-left flex items-center gap-4 transition-all active:scale-[0.98]"
                        style={{
                          background: goalType==="limit" ? "#F2D38812" : "var(--card)",
                          border: `2px solid ${goalType==="limit" ? "#F2D388" : "var(--bdr)"}`,
                        }}>
                        <span className="text-4xl shrink-0">📊</span>
                        <div>
                          <p className="text-base font-bold" style={{color:"var(--tx)"}}>Reduktions-Limit</p>
                          <p className="text-xs mt-0.5" style={{color:"var(--tx2)"}}>Konsum auf maximal N Tage pro Woche begrenzen.</p>
                          <p className="text-xs mt-1 font-semibold" style={{color:"#F2D388"}}>z.B. max. 2 Konsumtage pro Woche</p>
                        </div>
                      </button>
                    </div>

                    <div className="rounded-xl px-4 py-3" style={{background:"var(--card)",border:"1px solid var(--bdr)"}}>
                      <p className="text-xs leading-relaxed" style={{color:"var(--tx2)"}}>
                        ⚕️ Auch Reduktion ist ein Ziel. Du definierst, was Fortschritt für dich bedeutet.
                      </p>
                    </div>
                  </WizardShell>
                );

                // Schritt 2 — Menge festlegen
                if (gStep === 2) return (
                  <WizardShell step={2} total={3}
                    label={goalType === "clean" ? "🌟 Abstinenz-Ziel" : "📊 Reduktions-Limit"}
                    onBack={() => setGStep(1)}>

                    {goalType === "clean" ? (
                      <>
                        <div className="text-center">
                          <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>
                            Wie viele cleane Tage?
                          </p>
                          <p className="text-sm mt-1" style={{color:"var(--tx2)"}}>Wähle ein Ziel, das realistisch und motivierend ist.</p>
                        </div>

                        {/* Schnellwahl */}
                        <div className="grid grid-cols-3 gap-2">
                          {[7, 14, 30, 60, 90].map(n => (
                            <button key={n} onClick={() => setNewTarget(n)}
                              className="py-4 rounded-2xl text-sm font-bold transition-all active:scale-95"
                              style={{
                                background: newTarget===n ? "var(--acc)20" : "var(--card)",
                                border: `2px solid ${newTarget===n ? "var(--acc)" : "var(--bdr)"}`,
                                color: newTarget===n ? "var(--acc)" : "var(--tx2)",
                              }}>
                              {n} Tage
                            </button>
                          ))}
                          {/* Eigene Zahl — nimmt zwei Spalten */}
                          <button onClick={() => {}} className="col-span-1 py-4 rounded-2xl text-sm font-bold"
                            style={{background:"var(--card)",border:"1px solid var(--bdr)",color:"var(--tx2)",fontSize:10}}>
                            Eigene ↓
                          </button>
                        </div>

                        {/* Stepper */}
                        <div>
                          <div className="flex items-center gap-4 justify-center">
                            <button onClick={() => setNewTarget(Math.max(1, newTarget - 1))}
                              className="w-14 h-14 rounded-2xl text-2xl font-bold"
                              style={{background:"var(--card2)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>−</button>
                            <span className="text-5xl font-black w-24 text-center"
                              style={{color:"var(--acc)",fontFamily:"var(--fontD)"}}>{newTarget}</span>
                            <button onClick={() => setNewTarget(newTarget + 1)}
                              className="w-14 h-14 rounded-2xl text-2xl font-bold"
                              style={{background:"var(--card2)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>+</button>
                          </div>
                          <p className="text-xs text-center mt-2" style={{color:"var(--tx2)"}}>
                            {newTarget <= 7 ? "Ein guter erster Schritt." : newTarget <= 30 ? "Ein solides Ziel." : newTarget <= 60 ? "Ambitioniert — du packst das." : "Sehr ambitioniert. Schritt für Schritt."}
                          </p>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="text-center">
                          <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>
                            Max. Konsumtage pro Woche?
                          </p>
                          <p className="text-sm mt-1" style={{color:"var(--tx2)"}}>Gezählt werden Tage mit mindestens einem Log-Eintrag (Mo–So).</p>
                        </div>

                        <div className="flex items-center gap-4 justify-center py-4">
                          <button onClick={() => setNewMaxPerWeek(Math.max(1, newMaxPerWeek - 1))}
                            className="w-16 h-16 rounded-2xl text-3xl font-bold"
                            style={{background:"var(--card2)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>−</button>
                          <div className="text-center w-24">
                            <span className="text-6xl font-black" style={{color:"#F2D388",fontFamily:"var(--fontD)"}}>{newMaxPerWeek}</span>
                            <p className="text-xs mt-1" style={{color:"var(--tx2)"}}>Tage/Woche</p>
                          </div>
                          <button onClick={() => setNewMaxPerWeek(Math.min(7, newMaxPerWeek + 1))}
                            className="w-16 h-16 rounded-2xl text-3xl font-bold"
                            style={{background:"var(--card2)",color:"var(--tx)",border:"1px solid var(--bdr)"}}>+</button>
                        </div>

                        {/* Visuelle Einheiten-Skala */}
                        <div className="flex gap-2 justify-center">
                          {Array.from({length: 7}).map((_, i) => (
                            <div key={i} className="w-9 h-9 rounded-xl flex items-center justify-center text-sm font-bold transition-all"
                              style={{
                                background: i < newMaxPerWeek ? "#F2D38820" : "var(--card)",
                                border: `1.5px solid ${i < newMaxPerWeek ? "#F2D388" : "var(--bdr)"}`,
                                color: i < newMaxPerWeek ? "#F2D388" : "var(--tx2)",
                              }}>
                              {i < newMaxPerWeek ? "✓" : ""}
                            </div>
                          ))}
                        </div>
                        <p className="text-xs text-center" style={{color:"var(--tx2)"}}>
                          {newMaxPerWeek === 1 ? "Sehr konservativ — großer Schritt." : newMaxPerWeek <= 3 ? "Solide Reduktion." : newMaxPerWeek <= 5 ? "Ein machbares Limit." : "Jede Begrenzung ist ein Fortschritt."}
                        </p>
                      </>
                    )}

                    <button onClick={() => setGStep(3)}
                      className="w-full py-4 rounded-2xl text-base font-bold"
                      style={{background:"linear-gradient(135deg,var(--acc),#6272C4)",color:"#fff"}}>
                      Weiter →
                    </button>
                  </WizardShell>
                );

                // Schritt 3 — Substanzbezug + Zusammenfassung
                if (gStep === 3) return (
                  <WizardShell step={3} total={3} label="Zusammenfassung" onBack={() => setGStep(2)}>
                    <div className="text-center">
                      <p className="text-2xl font-bold" style={{color:"var(--tx)",fontFamily:"var(--fontD)"}}>
                        Worauf bezieht sich das Ziel?
                      </p>
                      <p className="text-sm mt-1" style={{color:"var(--tx2)"}}>Optional — leer lassen = gilt für alles.</p>
                    </div>

                    {/* Substanz-Filter */}
                    <div className="flex flex-wrap gap-2">
                      <button
                        onClick={() => setNewTargetSubs([])}
                        className="px-3 py-2 rounded-xl text-xs font-semibold transition-all active:scale-95"
                        style={{
                          background: newTargetSubs.length===0 ? "var(--acc)20" : "var(--card)",
                          border: `1.5px solid ${newTargetSubs.length===0 ? "var(--acc)" : "var(--bdr)"}`,
                          color: newTargetSubs.length===0 ? "var(--acc)" : "var(--tx2)",
                        }}>
                        Alles
                      </button>
                      {(prefs.mySubs?.length > 0 ? prefs.mySubs : SUBSTANCES)
                        .filter(s => !s.startsWith("Andere"))
                        .map(s => (
                          <button key={s}
                            onClick={() => setNewTargetSubs(p => p.includes(s) ? p.filter(x=>x!==s) : [...p, s])}
                            className="px-3 py-2 rounded-xl text-xs font-semibold transition-all active:scale-95"
                            style={{
                              background: newTargetSubs.includes(s) ? "var(--acc)20" : "var(--card)",
                              border: `1.5px solid ${newTargetSubs.includes(s) ? "var(--acc)" : "var(--bdr)"}`,
                              color: newTargetSubs.includes(s) ? "var(--acc)" : "var(--tx2)",
                            }}>
                            {subEmoji(s)} {s}
                          </button>
                        ))}
                    </div>

                    {/* Zusammenfassung */}
                    <div className="rounded-2xl overflow-hidden" style={{border:"1px solid var(--bdr)"}}>
                      {[
                        { l: "Zieltyp", v: goalType === "clean" ? "🌟 Abstinenz-Ziel" : "📊 Reduktions-Limit" },
                        goalType === "clean"
                          ? { l: "Ziel",    v: `${newTarget} cleane Tage` }
                          : { l: "Limit",   v: `Max. ${newMaxPerWeek} Konsumtage / Woche` },
                        { l: "Bezug", v: newTargetSubs.length > 0 ? newTargetSubs.map(s=>`${subEmoji(s)} ${s}`).join(", ") : "Alles" },
                      ].map((row, i) => (
                        <div key={i} className="flex items-start gap-3 px-4 py-3"
                          style={{borderBottom:"1px solid var(--bdr)",background:i%2===0?"var(--card)":"var(--card2)"}}>
                          <span className="text-xs font-bold shrink-0 w-16" style={{color:"var(--tx2)"}}>{row.l}</span>
                          <span className="text-xs font-semibold" style={{color:"var(--tx)"}}>{row.v}</span>
                        </div>
                      ))}
                    </div>

                    <button onClick={() => { saveTarget(); setGStep(1); }}
                      className="w-full py-5 rounded-2xl text-base font-black transition-all active:scale-[0.97]"
                      style={{
                        background: "linear-gradient(135deg,#6BCB77,#4aaa58)",
                        color: "#fff",
